name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish, for example 0.2.0 or v0.2.0
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            RAW_VERSION="${{ github.event.release.tag_name }}"
          else
            RAW_VERSION="${{ inputs.version }}"
          fi

          VERSION="${RAW_VERSION#v}"

          if [[ -z "$VERSION" ]]; then
            echo "Unable to determine release version."
            exit 1
          fi

          echo "Publishing version: $VERSION"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Update package version
        run: npm version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version

      - name: Typecheck
        run: npm run check

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public --provenance
